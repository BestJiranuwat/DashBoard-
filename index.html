<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สถิติแบบสอบถาม</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun&display=swap" rel="stylesheet">
    <style>body { font-family: 'Sarabun', sans-serif; background-color: #f1f5f9; }</style>
</head>
<body class="p-8">
    <div class="max-w-4xl mx-auto space-y-6">
        <header class="text-center bg-white p-10 rounded-3xl shadow-sm border border-slate-200">
            <h1 class="text-4xl font-bold text-slate-800">ระบบวิเคราะห์สถิติอัจฉริยะ</h1>
            <p class="text-slate-500 mt-2">อัปโหลดไฟล์ Excel เพื่อเริ่มต้น</p>
            
            <div class="mt-8">
                <input type="file" id="fileInput" class="block w-full text-sm text-slate-500 file:mr-4 file:py-3 file:px-6 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100 cursor-pointer" accept=".xlsx, .xls, .csv" onchange="handleFileUpload(event)">
            </div>
        </header>

        <div id="resultArea" class="hidden space-y-6">
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 text-center">
                    <p class="text-slate-500">ค่าเฉลี่ยรวม</p>
                    <p id="totalMean" class="text-4xl font-bold text-indigo-600">-</p>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 text-center">
                    <p class="text-slate-500">จำนวนข้อคำถาม</p>
                    <p id="itemCount" class="text-4xl font-bold text-emerald-600">-</p>
                </div>
            </div>
            
            <div id="tableContainer" class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden"></div>
            
            <button onclick="askAI()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold hover:bg-slate-800 transition-all shadow-lg">🤖 สรุปผลอัจฉริยะโดย AI</button>
            <div id="aiResponse" class="bg-indigo-50 p-6 rounded-2xl border border-indigo-100 text-slate-700 min-h-[50px] leading-relaxed">บทวิเคราะห์จาก AI จะปรากฏตรงนี้...</div>
        </div>
    </div>

    <script>
        let results = [];

        function handleFileUpload(e) {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                const data = event.target.result;
                const workbook = XLSX.read(data, {type: 'binary'});
                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                const rows = XLSX.utils.sheet_to_json(sheet, {header: 1});
                
                const headers = rows[0];
                results = [];
                for(let c=0; c<headers.length; c++) {
                    let sum = 0, count = 0;
                    for(let r=1; r<rows.length; r++) {
                        let val = parseFloat(rows[r][c]);
                        if(!isNaN(val)) { sum += val; count++; }
                    }
                    if(count > 0) results.push({ name: headers[c] || `Item ${c+1}`, mean: (sum/count).toFixed(2) });
                }
                showResults();
            };
            reader.readAsBinaryString(file);
        }

        function showResults() {
            document.getElementById('resultArea').classList.remove('hidden');
            document.getElementById('itemCount').innerText = results.length;
            const avg = (results.reduce((a, b) => a + parseFloat(b.mean), 0) / results.length).toFixed(2);
            document.getElementById('totalMean').innerText = avg;

            let html = '<table class="w-full text-left"><thead class="bg-slate-50 border-b border-slate-200"><tr><th class="p-4">ข้อคำถาม</th><th class="p-4 text-center">Mean</th></tr></thead><tbody class="divide-y divide-slate-100">';
            results.forEach(r => {
                html += `<tr><td class="p-4 text-slate-700">${r.name}</td><td class="p-4 text-center font-bold text-indigo-600">${r.mean}</td></tr>`;
            });
            html += '</tbody></table>';
            document.getElementById('tableContainer').innerHTML = html;
        }

        async function askAI() {
            const box = document.getElementById('aiResponse');
            box.innerText = "🌀 AI กำลังวิเคราะห์ข้อมูลของคุณ...";
            const dataStr = results.map(r => `${r.name}:${r.mean}`).join(', ');
            const apiKey = "AIzaSyBopJhznXvooWSBbwkT-bDMb6qU2jZJqF0";
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: `สรุปสถิตินี้เป็นภาษาไทย: ${dataStr}` }] }] })
                });
                const resData = await response.json();
                box.innerText = resData.candidates[0].content.parts[0].text;
            } catch (err) {
                box.innerText = "❌ เกิดข้อผิดพลาดในการเชื่อมต่อ AI";
            }
        }
    </script>
</body>
</html>
