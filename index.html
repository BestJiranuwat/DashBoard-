<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard วิเคราะห์สถิติอัจฉริยะ (XAI & Fairness)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background: linear-gradient(135deg, #f8fafc 0%, #eff6ff 100%); min-height: 100vh; }
        .card-stat { background: white; padding: 2rem; border-radius: 1.5rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; text-align: center; }
        .btn-modern { transition: all 0.3s ease; font-weight: bold; border-radius: 1rem; }
        .btn-modern:hover:not(:disabled) { transform: translateY(-2px); filter: brightness(1.1); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="p-4 md:p-12">
    <div class="max-w-6xl mx-auto space-y-8">
        <header class="text-center space-y-4">
            <h1 class="text-4xl md:text-6xl font-bold text-slate-900">DashBoard <span class="text-indigo-600">ค่าทางสถิติ</span></h1>
            <p class="text-xl text-slate-500">วิเคราะห์ข้อมูลแบบสอบถามอัจฉริยะ</p>
        </header>

        <section class="bg-white p-8 rounded-[2rem] shadow-xl border border-slate-100 text-center">
            <label class="cursor-pointer">
                <div class="p-12 border-4 border-dashed border-slate-200 rounded-[2rem] hover:bg-indigo-50 transition-all">
                    <p class="text-2xl font-bold text-slate-700" id="file-status">คลิกเพื่อนำเข้าไฟล์ Excel (.xlsx) หรือ CSV</p>
                    <input type="file" class="hidden" accept=".xlsx, .xls, .csv" onchange="handleFileUpload(event)">
                </div>
            </label>
            <button id="analyze-btn" onclick="analyzeData()" class="btn-modern bg-indigo-600 text-white px-8 py-4 mt-6 text-xl disabled:opacity-30" disabled>🚀 เริ่มวิเคราะห์ข้อมูล</button>
        </section>

        <div id="results-area" class="hidden space-y-8">
            <div id="summary-cards" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
            
            <div class="bg-white p-6 rounded-[2rem] shadow-lg overflow-hidden">
                <h3 class="text-2xl font-bold mb-4 px-4">ตารางสรุปผลสถิติ</h3>
                <div class="overflow-x-auto" id="table-container"></div>
            </div>

            <section id="ai-section" class="bg-slate-900 p-8 rounded-[3rem] text-white">
                <h3 class="text-3xl font-bold mb-6 flex items-center gap-3">🤖 บทวิเคราะห์โดย AI</h3>
                <div id="ai-content" class="bg-white/10 p-6 rounded-2xl min-h-[100px] text-xl leading-relaxed">
                    กดปุ่ม "สรุปผลอัจฉริยะ" ด้านล่างเพื่อเริ่มการวิเคราะห์
                </div>
            </section>
        </div>
    </div>

    <div class="fixed bottom-8 right-8 flex flex-col gap-4">
        <button onclick="generateAI()" id="ai-btn" class="btn-modern bg-indigo-600 text-white p-4 shadow-xl flex items-center gap-2" disabled>🧠 สรุปผลอัจฉริยะ</button>
        <button onclick="showManual()" class="btn-modern bg-white text-slate-700 p-4 shadow-lg border border-slate-200">📘 คู่มือ</button>
    </div>

    <script>
        let itemData = [];
        let results = [];

        function el(id) { return document.getElementById(id); }

        function handleFileUpload(e) {
            const file = e.target.files[0];
            if(!file) return;
            el('file-status').innerText = "📂 อ่านไฟล์: " + file.name;
            const reader = new FileReader();
            reader.onload = function(event) {
                const data = event.target.result;
                const workbook = XLSX.read(data, {type: 'binary'});
                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                const rows = XLSX.utils.sheet_to_json(sheet, {header: 1});
                
                itemData = [];
                const headers = rows[0];
                for(let c=0; c<headers.length; c++) {
                    const scores = [];
                    for(let r=1; r<rows.length; r++) {
                        const val = parseFloat(rows[r][c]);
                        if(!isNaN(val)) scores.push(val);
                    }
                    if(scores.length > 0) itemData.push({ name: headers[c] || `ข้อ ${c+1}`, scores });
                }
                el('analyze-btn').disabled = false;
            };
            reader.readAsBinaryString(file);
        }

        function analyzeData() {
            el('results-area').classList.remove('hidden');
            results = itemData.map(item => {
                const sum = item.scores.reduce((a,b) => a+b, 0);
                const mean = (sum / item.scores.length).toFixed(2);
                return { name: item.name, mean: mean };
            });

            const totalMean = (results.reduce((a,b) => a + parseFloat(b.mean), 0) / results.length).toFixed(2);

            el('summary-cards').innerHTML = `
                <div class="card-stat"><p class="text-slate-500">ค่าเฉลี่ยรวม</p><p class="text-5xl font-bold text-indigo-600">${totalMean}</p></div>
                <div class="card-stat"><p class="text-slate-500">จำนวนหัวข้อ</p><p class="text-5xl font-bold text-emerald-500">${results.length}</p></div>
                <div class="card-stat"><p class="text-slate-500">สถานะ</p><p class="text-3xl font-bold text-slate-700">วิเคราะห์แล้ว</p></div>
            `;

            let tableHtml = `<table class="min-w-full">
                <thead class="bg-slate-50"><tr><th class="p-4 text-left">ข้อคำถาม</th><th class="p-4">ค่าเฉลี่ย (Mean)</th></tr></thead>
                <tbody class="divide-y divide-slate-100">
                    ${results.map(r => `<tr><td class="p-4">${r.name}</td><td class="p-4 text-center font-bold">${r.mean}</td></tr>`).join('')}
                </tbody></table>`;
            el('table-container').innerHTML = tableHtml;
            el('ai-btn').disabled = false;
            window.scrollTo({ top: el('results-area').offsetTop, behavior: 'smooth' });
        }

        async function generateAI() {
            const content = el('ai-content');
            content.innerHTML = "🌀 กำลังส่งข้อมูลให้ AI วิเคราะห์...";
            const resultsText = results.map(r => `${r.name}: ${r.mean}`).join(', ');
            const apiKey = "AIzaSyBopJhznXvooWSBbwkT-bDMb6qU2jZJqF0";
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: `สรุปสถิตินี้เป็นภาษาไทยแบบสั้นๆ: ${resultsText}` }] }] })
                });
                const data = await response.json();
                content.innerHTML = data.candidates[0].content.parts[0].text;
            } catch (err) {
                content.innerHTML = "❌ เกิดข้อผิดพลาด: API Key อาจมีปัญหา";
            }
        }

        function showManual() { alert("1. อัปโหลดไฟล์ Excel\n2. กดปุ่มวิเคราะห์\n3. ดูผลสถิติและ AI"); }
    </script>
</body>
</html>
