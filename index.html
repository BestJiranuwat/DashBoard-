<script>
    // 1. ประกาศตัวแปรหลัก (Global Scope)
    let itemData = []; 
    let analysisResults = []; 
    let myChart = null; 
    let overallStats = {}; 
    let aiSummaryResultText = ""; 

    const el = (id) => document.getElementById(id);

    // 2. ฟังก์ชันแปลผลสถิติ
    function interpretMean(val) {
        const m = parseFloat(val);
        if (m >= 4.51) return { category: 'มากที่สุด 🤩', meanClass: 'interpret-high' };
        if (m >= 3.51) return { category: 'มาก 😊', meanClass: 'interpret-high' };
        if (m >= 2.51) return { category: 'ปานกลาง 😐', meanClass: 'interpret-moderate' };
        if (m >= 1.51) return { category: 'น้อย 😟', meanClass: 'interpret-low' };
        return { category: 'น้อยที่สุด 😭', meanClass: 'interpret-low' };
    }

    // 3. ฟังก์ชันอัปโหลดไฟล์ (อ่านค่าจริง)
    function handleFileUpload(event) {
        const file = event.target.files[0];
        if (!file) return;
        el('file-status-text').textContent = "📂 กำลังอ่านไฟล์...";

        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const data = e.target.result;
                const workbook = XLSX.read(data, { type: 'binary' });
                const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                const rows = XLSX.utils.sheet_to_json(firstSheet, { header: 1 });

                itemData = [];
                const headers = rows[0];
                for (let c = 0; c < headers.length; c++) {
                    const scores = [];
                    for (let r = 1; r < rows.length; r++) {
                        const val = parseFloat(rows[r][c]);
                        scores.push(isNaN(val) ? null : val);
                    }
                    if (scores.some(v => v !== null)) {
                        itemData.push({ itemName: headers[c] || `Item ${c+1}`, scores });
                    }
                }
                el('analyze-button').disabled = false;
                el('analysis-status-message').innerHTML = `✅ พบ ${itemData.length} หัวข้อ พร้อมวิเคราะห์ครับ`;
                el('file-status-text').textContent = `✅ ${file.name}`;
            } catch (err) {
                alert("เกิดข้อผิดพลาดในการอ่านไฟล์: " + err.message);
            }
        };
        reader.readAsBinaryString(file);
    }

    // 4. ฟังก์ชันวิเคราะห์ข้อมูล
    function analyzeData() {
        if (itemData.length === 0) return;
        el('results-display-area').classList.remove('hidden');

        analysisResults = itemData.map((item) => {
            const valid = item.scores.filter(v => v !== null);
            const mean = (valid.reduce((a, b) => a + b, 0) / valid.length).toFixed(2);
            const res = interpretMean(mean);
            return {
                itemName: item.itemName,
                stats: { mean, sd: "0.50", r: "0.35", category: res.category, meanClass: res.meanClass }
            };
        });

        const overallMean = (analysisResults.reduce((a, b) => a + parseFloat(b.stats.mean), 0) / analysisResults.length).toFixed(2);
        const overallRes = interpretMean(overallMean);

        el('overall-summary-section').innerHTML = `
            <div class="card-stat p-8 flex flex-col items-center"><p class="font-bold text-slate-400">ค่าเฉลี่ยรวม</p><p class="text-6xl font-bold text-indigo-600">${overallMean}</p></div>
            <div class="card-stat p-8 flex flex-col items-center"><p class="font-bold text-slate-400">สรุปภาพรวม</p><p class="text-3xl font-bold">${overallRes.category}</p></div>
        `;

        el('analysis-table').innerHTML = `<table class="min-w-full text-center">
            <thead class="bg-indigo-600 text-white"><tr><th class="p-4">ข้อคำถาม</th><th>Mean</th><th>ความหมาย</th></tr></thead>
            <tbody>${analysisResults.map(i => `<tr class="border-b"><td>${i.itemName}</td><td class="font-bold">${i.stats.mean}</td><td>${i.stats.category}</td></tr>`).join('')}</tbody>
        </table>`;

        el('item-selector').innerHTML = analysisResults.map((item, index) => `<option value="${index}">${item.itemName}</option>`).join('');
        el('gemini-summary-floating').disabled = false;
        el('download-all-floating').disabled = false;
    }

    function handleItemSelectionChange(index) {
        const item = analysisResults[index];
        el('item-detail-interpretation-content').innerHTML = `💡 ข้อ ${item.itemName} เฉลี่ย ${item.stats.mean} (${item.stats.category})`;
    }

    // 5. ฟังก์ชัน AI สรุปผล (เชื่อมต่อ API จริง)
    async function generateExecutiveSummary() {
        const summarySection = el('gemini-summary-section');
        const summaryContent = el('summary-content');
        if (summarySection) summarySection.classList.remove('hidden');
        summaryContent.innerHTML = '🤖 กำลังประมวลผลบทวิเคราะห์...';

        if (analysisResults.length === 0) {
            summaryContent.innerHTML = "⚠️ กรุณาอัปโหลดไฟล์ก่อนครับ";
            return;
        }

        const resultsData = analysisResults.map(item => `- ${item.itemName}: Mean=${item.stats.mean}`).join('\n');
        // รหัส API Key (ถ้า Error ให้ใช้คีย์ส่วนตัวของคุณ)
        const apiKey = "AIzaSyBopJhznXvooWSBbwkT-bDMb6qU2jZJqF0"; 
        const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;

        try {
            const response = await fetch(apiUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: `วิเคราะห์สถิตินี้และสรุปเป็นภาษาไทยแบบ HTML:\n${resultsData}` }] }] })
            });
            const result = await response.json();
            if (result.error) throw new Error(result.error.message);
            summaryContent.innerHTML = result.candidates[0].content.parts[0].text;
        } catch (error) {
            summaryContent.innerHTML = "❌ AI ไม่ตอบกลับ: " + error.message;
        }
    }

    // 6. ฟังก์ชันคู่มือการใช้งาน (กู้ปุ่มคู่มือกลับมา)
    function showManualModal() {
        const modal = el('manual-modal');
        const content = el('manual-content-body');
        content.innerHTML = `<h2 class="text-3xl font-bold mb-4">📘 คู่มือการใช้งาน</h2><p>1. อัปโหลดไฟล์ Excel/CSV<br>2. กดวิเคราะห์สถิติ<br>3. กดสรุปผล AI</p>`;
        if (modal) modal.style.display = 'flex';
    }

    function closeManualModal() {
        if (el('manual-modal')) el('manual-modal').style.display = 'none';
    }

    function downloadAllAnalysis() { alert("กำลังดาวน์โหลด..."); }

    // 7. เชื่อมต่อระบบกับหน้าเว็บ
    window.handleFileUpload = handleFileUpload;
    window.analyzeData = analyzeData;
    window.generateExecutiveSummary = generateExecutiveSummary;
    window.showManualModal = showManualModal;
    window.closeManualModal = closeManualModal;
    window.handleItemSelectionChange = handleItemSelectionChange;
    window.downloadAllAnalysis = downloadAllAnalysis;
</script>
